<!DOCTYPE html>
<html lang = "en"  dir = "ltr">
<head>
  <meta charset ="utf-8">
  <meta content-type="text/html">
  <!--meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0"-->
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/png" sizes="32x32" href="./Classes/Images/favicon-32x32.png">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css"> 
  <title>Dynamic Calendar</title>
  <link rel = "stylesheet" href="style.css"> 
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link rel="stylesheet" href ="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<script src="jquery-3.7.1.js"></script>  
<script type= "module" src="script.js" async></script>
  </head>

  <body>
   
    <div class="wrapper">     
                <div class="calendar">
                  <header>
                    <p class="current-date"></p>
                    <div class="icons">
                      <span id = "prev" class="material-symbols-rounded">chevron_left</span>
                      <span id = "next" class="material-symbols-rounded">chevron_right</span>
                    </div>
                    </header>
                  <ul class="weeks">
                    <li>So</li>
                    <li>Mo</li>
                    <li>Di</li>
                    <li>Mi</li>
                    <li>Do</li>
                    <li>Fr</li>
                    <li>Sa</li> 
                  </ul>
                  <ul class="days"></ul> 
                </div>
                <div class="itemSelector">
                  <legend class="formHeading" id ="formHeading"></legend>  
                     </div>
     
                 <form class ="getInputfields" autocomplete="off" id="getInputfields" style="width:100%">
                                 
                      <div class="formLetter" id="formLetter">
                        <h2>Brief</h2>
                        <div class="fancy-input">
                          <label for="floatWeight">Gewicht</label>
                          <input id="floatWeight" name="floatWeight" maxlength ="8">
                        </div>
                        
                        <div class="fancy-input">
                          <label for="floatWidth">Breite in cm</label>
                          <input id="floatWidth" name="floatWidth" maxlength ="8">
                        </div>
                        <div class="fancy-input">
                          <label for="floatHeight">Höhe in cm</label>
                          <input id="floatHeight" name="floatHeight" maxlength ="8">
                        </div>
                        <div class="fancy-input">
                          <label for="description">Beschreibung</label>
                          <textarea class="description" id="description" name="description"></textarea>
                        </div>
                        <button type="submit">Absenden</button>
                      </div>

                      <div class="formPackage" id="formPackage">
                        <h2>Paket</h2>
                        <div class="fancy-input">
                          <label for="floatWeight">Gewicht in kg</label>
                          <input id="floatWeight" name="floatWeight" maxlength ="8">
                        </div>
                        <div class="fancy-input">
                          <label for="floatLength">Länge in cm</label>
                          <input id="floatLength" name="floatLength" maxlength ="8">
                        </div>
                        <div class="fancy-input">
                          <label for="floatWidth">Breite in cm</label>
                          <input id="floatWidth" name="floatWidth" maxlength ="8">
                        </div>
                        <div class="fancy-input">
                          <label for="floatHeight">Höhe in cm</label>
                          <input id="floatHeight" name="floatHeight" maxlength ="8">
                        </div>
                        <div class="fancy-input">
                          <label for="description">Beschreibung</label>
                          <textarea class="description" id="description" name="description"></textarea>
                        </div>
                        <button type="submit">Absenden</button>
                      </div>

                  </form>
                 
              </div> 
            </div>
   



	  
  </body>
  </html>
