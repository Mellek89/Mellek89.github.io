<!DOCTYPE html>
<html lang = "en"  dir = "ltr">
<head>
  <meta charset ="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  
  <title>Dynamic Calendar</title>
  <link rel = "stylesheet" href="style.css"> 
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href ="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
   
   
<script src="./Classes/user.js" async></script>  
<script type="module" src="./Classes/airmail.js" async></script>
<script src="script.js" async></script>
  </head>

  <body>
    <div class="wrapper">
    <header>
  	<p class="current-date"></p>
    <div class="icons">
      <span id = "prev" class="material-symbols-rounded">chevron_left</span>
      <span id = "next" class="material-symbols-rounded">chevron_right</span>
      </div>
    </header>
    <div class="calendar">
      <ul class="weeks">
        <li>So</li>
        <li>Mo</li>
        <li>Di</li>
        <li>Mi</li>
        <li>Do</li>
        <li>Fr</li>
        <li>Sa</li> 
      </ul>
      <ul class="days"></ul> 
      </div>
    </div>
    
<form autocomplete="off" id="getInputfields">
<div class="custom-select">
  <label for="selectPackageType">Type</label>
  <select id="selectPackageType" name ="type">
  
    <option value="1">letter</option>
    <option value="2" >package</option> 
  </select>
  </div>

<div class="fancy-input">
<label for="floatWeight">Weight</label>
<input id="floatWeight" name="floatWeight" maxlength ="8">
</div>
<div class="fancy-input">
<label for="floatHeight">Height</label>
<input id="floatHeight" name="floatHeight" maxlength ="8">
</div>
<div class="fancy-input">
<label for="description">Description</label>
<input id="description" name="description">
</div>

</form>

<button onclick="submit()">Submit</button>


	  
  </body>
</html>
